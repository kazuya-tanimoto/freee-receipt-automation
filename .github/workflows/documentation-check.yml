name: Documentation Check

on:
  push:
    paths:
      - '**.md'
      - 'docs/**'
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Markdown
        uses: DavidAnson/markdownlint-action@v1
        with:
          config: .markdownlint.json

      - name: Check Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'yes'
          folder-path: 'docs'

      - name: Check File Size
        run: |
          for file in $(find docs -name "*.md"); do
            size=$(wc -c < "$file")
            if [ $size -gt 100000 ]; then
              echo "Warning: $file is larger than 100KB (100000 bytes)"
              exit 1
            fi
          done

      # Security Scan and SBOM generation removed as this is not a Node.js project

      - name: Check Language Consistency
        run: |
          for file in $(find docs -name "*-ja.md"); do
            en_file=${file%-ja.md}.md
            if [ ! -f "$en_file" ]; then
              echo "Error: English version missing for $file"
              exit 1
            fi
          done

      - name: Check README synchronization
        id: check-sync
        run: |
          # Check if both files have the same number of heading lines
          en_headings=$(grep "^#" README.md | wc -l)
          ja_headings=$(grep "^#" README-ja.md | wc -l)
          
          if [ "$en_headings" -ne "$ja_headings" ]; then
            echo "::error::README.md ($en_headings headings) and README-ja.md ($ja_headings headings) have different structure"
            exit 1
          fi
          
          # Check if both files have similar code blocks
          en_code_blocks=$(grep -c "^\`\`\`" README.md || true)
          ja_code_blocks=$(grep -c "^\`\`\`" README-ja.md || true)
          
          if [ "$en_code_blocks" -ne "$ja_code_blocks" ]; then
            echo "::warning::README.md ($en_code_blocks code blocks) and README-ja.md ($ja_code_blocks code blocks) have different number of code blocks"
          fi
          
          echo "README files structure check passed"

      - name: Check multilingual synchronization
        id: check-multilingual
        run: |
          for file in $(find docs -name "*-ja.md"); do
            base_file=${file%-ja.md}.md
            if [ -f "$base_file" ]; then
              # Check if both files have the same number of headings
              en_headings=$(grep "^#" "$base_file" | wc -l)
              ja_headings=$(grep "^#" "$file" | wc -l)
              
              if [ "$en_headings" -ne "$ja_headings" ]; then
                echo "::error::$file ($ja_headings headings) and $base_file ($en_headings headings) have different structure"
                exit 1
              fi
              
              # Check if both files have similar code blocks
              en_code_blocks=$(grep -c "^\`\`\`" "$base_file" || true)
              ja_code_blocks=$(grep -c "^\`\`\`" "$file" || true)
              
              if [ "$en_code_blocks" -ne "$ja_code_blocks" ]; then
                echo "::warning::$file ($ja_code_blocks code blocks) and $base_file ($en_code_blocks code blocks) have different number of code blocks"
              fi
            fi
          done
          
          echo "Multilingual files structure check passed"

      - name: Check document structure
        id: check-structure
        run: |
          for file in $(find docs/standards docs/ops -name "*.md"); do
            if [[ "$file" =~ /(README|CHANGELOG|SUMMARY)\.(md|ja\.md)$ ]]; then
              continue  # Skip special files
            fi
            
            # Check for Overview/概要 section
            if [[ "$file" =~ -ja\.md$ ]]; then
              # Japanese file
              if ! grep -q "## 概要" "$file"; then
                echo "::error::$file is missing '概要' section"
                exit 1
              fi
              if ! grep -q "## 参考リンク" "$file"; then
                echo "::error::$file is missing '参考リンク' section"
                exit 1
              fi
            else
              # English file
              if ! grep -qE "## (Overview|概要)" "$file"; then
                echo "::error::$file is missing 'Overview' section"
                exit 1
              fi
              if ! grep -qE "## (Reference Links?|References|参考リンク)" "$file"; then
                echo "::error::$file is missing 'Reference Links' section"
                exit 1
              fi
            fi
          done
          
          echo "Document structure check passed"

      # Vulnerability check removed as this is not a Node.js project 