name: Markdown Link Check

on:
  push:
    paths:
      - '**/*.md'
      - '.mlc_config.json'
  pull_request:
    paths:
      - '**/*.md'
      - '.mlc_config.json'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - uses: actions/setup-node@v4.0.2
        with:
          node-version: '20'

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check Markdown Links
        run: |
          failed=false
          
          while IFS= read -r file; do
            echo "Checking links in: $file"
            
            if ! markdown-link-check "$file" -c .mlc_config.json; then
              echo "::warning::Failed to check links in $file"
              failed=true
            fi
          done < <(find . -name "*.md" -not -path "./node_modules/*" -not -path "./.git/*")
          
          if [ "$failed" = "true" ]; then
            echo "::error::Some files have link issues"
            exit 1
          fi
          
          echo "All markdown link checks passed" 